{% extends "base.html" %}

{% block title %}Admin Login - CarHire{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">🔐</div>
            <h1 class="text-3xl font-bold text-gray-800">Admin Access</h1>
            <p class="text-gray-600 mt-2">Enter your credentials to continue</p>
        </div>
        
        {% if error %}
        <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded animate-shake">
            <p class="text-red-700">{{ error }}</p>
        </div>
        {% endif %}
        
        <form method="POST" onsubmit="showLoading(this)">
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Username</label>
                <input type="text" name="username" required autofocus
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 transition">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 transition">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:shadow-lg transform hover:scale-105 transition-all duration-200">
                Login to Dashboard →
            </button>
        </form>
       
    </div>
</div>
{% endblock %}
